<script>
const COOLDOWN_TIME = 10 * 60 * 1000;
const STORAGE_KEY = "lakala_last_submit";
let cooldownTimer = null;
const submitBtn = document.getElementById('submitBtn');
const originalBtnText = submitBtn.textContent;

function checkCooldown() {
    const lastTime = localStorage.getItem(STORAGE_KEY);
    if (!lastTime) return false;
    const now = Date.now();
    const diff = now - parseInt(lastTime);
    if (diff < COOLDOWN_TIME) {
        startCooldown(COOLDOWN_TIME - diff);
        return true;
    } else {
        localStorage.removeItem(STORAGE_KEY);
        return false;
    }
}

function startCooldown(remaining) {
    submitBtn.disabled = true;
    clearInterval(cooldownTimer);
    cooldownTimer = setInterval(() => {
        remaining -= 1000;
        if (remaining <= 0) {
            clearInterval(cooldownTimer);
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            localStorage.removeItem(STORAGE_KEY);
            return;
        }
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        submitBtn.textContent = `还剩 ${minutes}分${seconds}秒 才能再次提交`;
    }, 1000);
}

function updateCities() {
    const province = document.getElementById('province').value;
    const citySelect = document.getElementById('city');
    citySelect.innerHTML = '<option value="">请选择城市</option>';
    if (province && cityData[province]) {
        cityData[province].forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }
}

function initUploadPreview() {
    const inputs = [
        {input: document.getElementById('photo1'), preview: document.getElementById('preview1'), defaultContent: document.querySelector('#photo1').parentElement.querySelector('.default-content')},
        {input: document.getElementById('photo2'), preview: document.getElementById('preview2'), defaultContent: document.querySelector('#photo2').parentElement.querySelector('.default-content')},
        {input: document.getElementById('photo3'), preview: document.getElementById('preview3'), defaultContent: document.querySelector('#photo3').parentElement.querySelector('.default-content')},
        {input: document.getElementById('photo4'), preview: document.getElementById('preview4'), defaultContent: document.querySelector('#photo4').parentElement.querySelector('.default-content')}
    ];
    inputs.forEach(item => {
        item.input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                item.defaultContent.style.display = 'none';
                item.preview.src = e.target.result;
                item.preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });
}

window.onload = function() {
    initUploadPreview();
    document.getElementById('province').addEventListener('change', function(){
        updateCities();
    });
    checkCooldown();
};

submitBtn.onclick = function() {
    if (submitBtn.disabled) return;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const province = document.getElementById('province').value;
    const city = document.getElementById('city').value;
    const address = document.getElementById('address').value.trim();
    const p1 = document.getElementById('photo1').files[0];
    const p2 = document.getElementById('photo2').files[0];
    const p3 = document.getElementById('photo3').files[0];
    const p4 = document.getElementById('photo4').files[0];

    if (!name || !phone || !province || !city || !address) {
        alert('请填写完整必填信息！');
        return;
    }
    if (!p1 || !p2 || !p3 || !p4) {
        alert('请上传全部4张照片！');
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "提交中，请稍候...";
    document.querySelector('form').submit();
}
